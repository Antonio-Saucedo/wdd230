<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This site demonstrates DOM manipulation skills implemented by Antonio Saucedo."
    />
    <title>Book of Mormon Reading List</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header>
      <h1>
        <span class="opened-book">📘</span
        ><span class="closed-book">📖</span> Book of Mormon - Top 25
      </h1>
    </header>
    <main>
      <div class="input-container">
        <label for="book-chapter-input"
          >Enter Book and Chapter
          <input
            type="text"
            id="book-chapter-input"
            placeholder="Alma 5"
            required
          />
        </label>
        <button id="add-button" type="submit">Add Chapter</button>
      </div>
      <div class="list-container">
        <ul class="list"></ul>
      </div>
    </main>
    <script src="scripts/main.js"></script>
  </body>
</html>
