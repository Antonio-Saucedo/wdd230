<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A responsive card page demo by Antonio Saucedo displaying Latter-Day Prophets born in Utah, with their birthdate and birthplace, built with async/await, DOM manipulation, and template literals."
    />
    <title>Latter-Day Prophet • Card Page</title>
    <link rel="stylesheet" href="styles/prophets.css" />
    <script src="scripts/prophets.js" defer></script>
  </head>
  <body data-page="Utah">
    <header>
      <h1>Latter-Day Prophets</h1>
      <p>Birthplace, date of birth, and more</p>
    </header>
    <nav>
      <ul>
        <li><a href="prophets.html">All Prophets</a></li>
        <li class="active"><a href="#">Born in Utah</a></li>
        <li><a href="prophets-not-utah.html">Not Born in Utah</a></li>
      </ul>
    </nav>
    <main>
      <div class="cards"><p class="loading">Loading prophets...</p></div>
      <template id="prophet-card">
        <section>
          <img loading="lazy" />
          <div>
            <h2></h2>
            <p class="birthdate">Born: <strong></strong></p>
            <p class="birthplace">Place: <strong></strong></p>
          </div>
        </section>
      </template>
    </main>
    <footer>Antonio Saucedo • Rexburg • BYU Idaho • WDD 230</footer>
  </body>
</html>
