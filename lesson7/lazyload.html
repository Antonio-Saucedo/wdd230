<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progressive Loading of Images • Antonio Saucedo</title>
    <meta
      name="description"
      content="A demo by Antonio Saucedo showcasing progressive image loading, where placeholder images are replaced with full images as they enter the viewport."
    />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/main.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Progressive Loading Images</h1>
    </header>
    <main>
      <picture>
        <img
          src="images/placeholder.jpg"
          data-src="images/chicken.jpg"
          alt="chicken"
        />
      </picture>
      <picture>
        <img
          src="images/placeholder.jpg"
          data-src="images/goat.jpg"
          alt="goat"
        />
      </picture>
      <picture>
        <img
          src="images/placeholder.jpg"
          data-src="images/horse.jpg"
          alt="horse"
        />
      </picture>
      <picture>
        <img
          src="images/placeholder.jpg"
          data-src="images/llama.jpg"
          alt="llama"
        />
      </picture>
      <picture>
        <img src="images/placeholder.jpg" data-src="images/ram.jpg" alt="ram" />
      </picture>
      <picture>
        <img
          src="images/placeholder.jpg"
          data-src="images/sheep.jpg"
          alt="sheep"
        />
      </picture>
    </main>
    <footer id="footer">©</footer>
  </body>
</html>
