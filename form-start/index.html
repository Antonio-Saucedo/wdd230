<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- TELLS PHONES NOT TO LIE ABOUT THEIR WIDTH & stops the font from enlarging when a phone is turned sideways-->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <!--    <meta name="viewport" content="width=device-width, initial-scale=1.0" />-->
    <meta
      name="description"
      content="A responsive web form demo using a starter template for submitting course proposals, covering applicant details, audience level, software needs, and funding."
    />
    <meta name="author" content="Antonio Saucedo" />
    <title>Course Proposal • Web Forms</title>
    <link href="css/normalize.css" rel="stylesheet" />
    <link href="css/small.css" rel="stylesheet" />
    <link href="css/medium.css" rel="stylesheet" />
    <link href="css/large.css" rel="stylesheet" />
    <script src="scripts/main.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Course Proposal</h1>
      <h2>Designing Web Forms</h2>
    </header>
    <nav class="clearfix">
      <ul>
        <li class="active"><a href="#">Proposal</a></li>
      </ul>
    </nav>
    <main>
      <h1>Course Proposal Application</h1>
      <form method="get" action="thanks.html">
        <fieldset>
          <legend>Applicant Information</legend>
          <label class="top"
            >First Name<span class="red">*</span
            ><input type="text" name="fname" placeholder=" " required
          /></label>
          <label class="top"
            >Last Name<span class="red">*</span
            ><input type="text" name="lname" required
          /></label>
          <label class="top"
            >Phone <input type="tel" name="phone" placeholder="1235551234"
          /></label>
          <label class="top"
            >Email<span class="red">*</span>
            <input
              type="email"
              name="email"
              placeholder="someone@gmail.com"
              required
          /></label>
          <label class="top"
            >Website <input type="url" name="url" placeholder="http://"
          /></label>
        </fieldset>
        <fieldset>
          <legend>Course Information</legend>
          <div>Audience</div>
          <label class="sbs"
            ><input type="radio" name="audience" value="beginner" />
            Beginner</label
          >
          <label class="sbs"
            ><input type="radio" name="audience" value="Intermediate" />
            Intermediate</label
          >
          <label class="sbs"
            ><input type="radio" name="audience" value="Advanced" />
            Advanced</label
          >
          <div>Software Needed</div>
          <label class="sbs"
            ><input type="checkbox" name="code" value="yes" /> Coding</label
          >
          <label class="sbs"
            ><input type="checkbox" name="client" value="yes" /> FTP
            Client</label
          >
          <label class="sbs"
            ><input type="checkbox" name="editing" value="yes" /> Photo
            Editing</label
          >
          <label class="sbs"
            ><input type="checkbox" name="process" value="yes" />
            Preprocessor</label
          >
        </fieldset>
        <fieldset>
          <legend>Funding</legend>
          <label class="top"
            >Anticipated Completion Date <input type="date" name="completeDate"
          /></label>
          <label class="top" for="subject"
            >Course Subject<select id="subject" name="subject">
              <option value="">Please Select &#9662;</option>
              <option value="software">Software Development</option>
              <option value="creative">Creative Professional</option>
              <option value="info">Information Technology</option>
              <option value="data">Data Professional</option>
              <option value="construction">Construction</option>
              <option value="manufacturing">Manufacturing</option>
              <option value="business">Business Professional</option>
              <option value="security">Cyber Security</option>
            </select>
          </label>
          <label class="top"
            >How Many Authors <input type="number" name="authors"
          /></label>
        </fieldset>
        <input type="submit" value="Propose My Course" class="submitBtn" />
      </form>
    </main>
    <footer id="footer">©</footer>
  </body>
</html>
