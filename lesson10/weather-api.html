<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A live weather dashboard for Rigby, Id displaying current temperature, daily high and low, sky condition, and wind speed using the OpenWeatherMap API."
    />
    <title>Weather API • Demonstration</title>
    <script src="scripts/weather-api.js" defer></script>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="api-container">
      <header>
        <span></span>
        <h1>Open Weather Map API</h1>
        <span class="badge">Rigby, ID</span>
      </header>
      <main>
        <div class="temp-container">
          <div class="card">
            <p><span id="current-temp"></span>&deg;F</p>
            Current
          </div>
          <div class="card">
            <p><span id="min"></span>&deg;F</p>
            Low
          </div>
          <div class="card">
            <p><span id="max"></span>&deg;F</p>
            High
          </div>
        </div>
        <div class="conditions-container">
          <figure class="card">
            <img
              src="../chamber/images/weatherIcons/wind.png"
              alt="Weather icon"
              id="weather-icon"
            />
            <h2>Condition</h2>
            <figcaption></figcaption>
          </figure>
          <figure class="card">
            <img
              src="../chamber/images/weatherIcons/wind.png"
              alt="Wind Icon"
            />
            <h2>Wind Speed</h2>
            <figcaption><span id="wind-desc"></span> MPH</figcaption>
          </figure>
        </div>
      </main>
      <footer>
        <p>&#169; 2026 • Antonio Saucedo • BYUI-Idaho</p>
        <p>API &#8594; OpenWeatherMap</p>
      </footer>
    </div>
  </body>
</html>
